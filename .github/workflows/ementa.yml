name: Ementa IPC

on:
  schedule:
    - cron: '0 8 * * 1'  # Corre todas as segundas às 08:00 UTC (08:00/09:00 PT)
  workflow_dispatch:     # Permite correr manualmente a partir do GitHub

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Guarda dependências em cache

      - name: Instalar dependências
        run: pip install -r ementa-ipc/requirements.txt

      - name: Executar script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_CANTINA }}
        run: python ementa-ipc/script.py
